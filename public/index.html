                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="9 11 12 14 22 4" />
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                    </svg>
                </div>
                <span class="logo-text">TodoApp</span>
                <span class="logo-version">v1</span>
            </div>

            <nav class="nav">
                <span class="nav-section-label">Меню</span>
                <button class="nav-item active" data-tab="tasks" onclick="switchTab('tasks')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 11 12 14 22 4" />
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                    </svg>
                    Задачи
                </button>
                <button class="nav-item" data-tab="users" onclick="switchTab('users')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    Пользователи
                </button>
                <button class="nav-item" data-tab="stats" onclick="switchTab('stats')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg>
                    Статистика
                </button>
            </nav>

            <div class="theme-toggle-row">
                <span class="theme-toggle-label" id="theme-label">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    Темная тема
                </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="theme-toggle" onchange="toggleTheme(this.checked)" />
                    <span class="toggle-track"></span>
                </label>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <!-- Tasks -->
            <section id="tab-tasks" class="tab active">
                <div class="section-header">
                    <h1 class="section-title">Задачи</h1>
                    <button class="btn btn-primary" onclick="openTaskModal()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Новая задача
                    </button>
                </div>

                <div class="filters-bar">
                    <div class="filter-group">
                        <label>Пользователь</label>
                        <div class="cdd" id="cdd-filter">
                            <div class="cdd-trigger" onclick="cddToggle('cdd-filter')">
                                <span class="cdd-label" id="cdd-filter-label">Все пользователи</span>
                            </div>
                            <div class="cdd-menu">
                                <div class="cdd-search-wrap">
                                    <input class="cdd-search" placeholder="Поиск…"
                                        oninput="cddSearch('cdd-filter', this.value)" onclick="event.stopPropagation()">
                                </div>
                                <div class="cdd-list" id="cdd-filter-list"></div>
                            </div>
                        </div>
                        <input type="hidden" id="tf-uid">
                    </div>
                    <div class="filter-group">
                        <label>На странице</label>
                        <div class="page-size-wrap">
                            <input type="number" class="page-size-input" id="tf-limit" value="20" min="1" max="1000"
                                onchange="setPage('tasks',0);loadTasks()">
                            <span class="page-size-sep">|</span>
                            <select class="page-size-select"
                                onchange="document.getElementById('tf-limit').value=this.value;setPage('tasks',0);loadTasks()">
                                <option value="10">10</option>
                                <option value="20" selected>20</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-spacer"></div>
                    <button class="btn btn-secondary" onclick="clearTaskFilters()">Сбросить</button>
                </div>

                <div class="content-wrap">
                    <div id="tasks-loading-bar" class="content-loading-bar"></div>
                    <div id="tasks-container">
                        <div class="loading">
                            <div class="spinner"></div> Загрузка задач…
                        </div>
                    </div>
                </div>
                <div id="tasks-pagination"></div>
            </section>

            <!-- Users -->
            <section id="tab-users" class="tab">
                <div class="section-header">
                    <h1 class="section-title">Пользователи</h1>
                    <button class="btn btn-primary" onclick="openUserModal()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Новый пользователь
                    </button>
                </div>

                <div class="filters-bar">
                    <div class="filter-group">
                        <label>На странице</label>
                        <div class="page-size-wrap">
                            <input type="number" class="page-size-input" id="uf-limit" value="20" min="1" max="1000"
                                onchange="setPage('users',0);loadUsers()">
                            <span class="page-size-sep">|</span>
                            <select class="page-size-select"
                                onchange="document.getElementById('uf-limit').value=this.value;setPage('users',0);loadUsers()">
                                <option value="10">10</option>
                                <option value="20" selected>20</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-spacer"></div>
                </div>

                <div class="content-wrap">
                    <div id="users-loading-bar" class="content-loading-bar"></div>
                    <div id="users-container">
                        <div class="loading">
                            <div class="spinner"></div> Загрузка пользователей…
                        </div>
                    </div>
                </div>
                <div id="users-pagination"></div>
            </section>

            <!-- Stats -->
            <section id="tab-stats" class="tab">
                <div class="section-header">
                    <h1 class="section-title">Статистика</h1>
                    <button class="btn btn-secondary" onclick="loadStats()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10" />
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                        </svg>
                        Обновить
                    </button>
                </div>

                <div class="filters-bar">
                    <div class="filter-group">
                        <label>Пользователь</label>
                        <div class="cdd" id="cdd-stats">
                            <div class="cdd-trigger" onclick="cddToggle('cdd-stats')">
                                <span class="cdd-label" id="cdd-stats-label">Все пользователи</span>
                            </div>
                            <div class="cdd-menu">
                                <div class="cdd-search-wrap">
                                    <input class="cdd-search" placeholder="Поиск…"
                                        oninput="cddSearch('cdd-stats', this.value)" onclick="event.stopPropagation()">
                                </div>
                                <div class="cdd-list" id="cdd-stats-list"></div>
                            </div>
                        </div>
                        <input type="hidden" id="sf-uid">
                    </div>
                    <div class="filter-group">
                        <label>С</label>
                        <input type="date" class="input-sm input-date" id="sf-from">
                    </div>
                    <div class="filter-group">
                        <label>По</label>
                        <input type="date" class="input-sm input-date" id="sf-to">
                    </div>
                    <div class="filter-spacer"></div>
                    <button class="btn btn-secondary" onclick="clearStatsFilters()">Сбросить</button>
                    <button class="btn btn-primary" onclick="loadStats()">Применить</button>
                </div>

                <div class="content-wrap">
                    <div id="stats-loading-bar" class="content-loading-bar"></div>
                    <div id="stats-container">
                        <div class="loading">
                            <div class="spinner"></div> Загрузка статистики…
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Task Modal -->
    <div class="modal-overlay" id="task-modal-overlay" onclick="closeModal('task-modal-overlay', event)">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="task-modal-title">Новая задача</h2>
                <button class="btn-icon" onclick="closeModal('task-modal-overlay')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="form-group">
                <label class="form-label">Заголовок <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" id="task-title" placeholder="например, Взломать матрицу"
                    maxlength="100">
            </div>
            <div class="form-group">
                <label class="form-label">Описание</label>
                <textarea class="form-control" id="task-description" placeholder="Необязательно…"
                    maxlength="1000"></textarea>
            </div>
            <div class="form-group" id="task-author-group">
                <label class="form-label">Автор <span style="color:var(--danger)">*</span></label>
                <div class="cdd cdd-full" id="cdd-author">
                    <div class="cdd-trigger" onclick="cddToggle('cdd-author')">
                        <span class="cdd-label" id="cdd-author-label">— выберите —</span>
                    </div>
                    <div class="cdd-menu">
                        <div class="cdd-search-wrap">
                            <input class="cdd-search" placeholder="Поиск…" oninput="cddSearch('cdd-author', this.value)"
                                onclick="event.stopPropagation()">
                        </div>
                        <div class="cdd-list" id="cdd-author-list"></div>
                    </div>
                </div>
                <input type="hidden" id="task-author-id">
            </div>
            <div class="form-group" id="task-status-group" style="display:none">
                <label class="form-label">Статус</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="task-status" value="false" checked> В
                        работе</label>
                    <label class="radio-label"><input type="radio" name="task-status" value="true"> Выполнена</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('task-modal-overlay')">Отмена</button>
                <button class="btn btn-primary" id="task-submit-btn" onclick="submitTask()">Создать</button>
            </div>
        </div>
    </div>

    <!-- User Modal -->
    <div class="modal-overlay" id="user-modal-overlay" onclick="closeModal('user-modal-overlay', event)">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="user-modal-title">Новый пользователь</h2>
                <button class="btn-icon" onclick="closeModal('user-modal-overlay')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="form-group">
                <label class="form-label">Полное имя <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" id="user-fullname" placeholder="например, Neo" maxlength="100">
            </div>
            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input type="text" class="form-control" id="user-phone" placeholder="+79998887766" maxlength="15">
            </div>
            <div class="form-group" id="user-phone-null-group" style="display:none">
                <label class="checkbox-label">
                    <input type="checkbox" id="user-phone-null" onchange="onPhoneNullToggle(this)">
                    Очистить телефон (null)
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('user-modal-overlay')">Отмена</button>
                <button class="btn btn-primary" id="user-submit-btn" onclick="submitUser()">Создать</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirm-modal-overlay" onclick="closeModal('confirm-modal-overlay', event)">
        <div class="modal" style="max-width:440px">
            <div class="modal-header">
                <h2 class="modal-title" style="color:var(--danger)">
                    <svg style="width:22px;height:22px;display:inline;margin-right:8px;vertical-align:-4px"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                        <line x1="12" y1="9" x2="12" y2="13" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg>
                    Подтверждение
                </h2>
            </div>
            <p style="font-size:16px;color:var(--text-muted)" id="confirm-text">Вы уверены? Это необратимо.</p>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('confirm-modal-overlay')">Отмена</button>
                <button class="btn btn-danger" id="confirm-ok-btn">Удалить</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/script.js"></script>
</body>

</html>
